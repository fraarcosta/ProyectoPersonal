# Builds the Akena orchestrator and pushes to ECR (eu-north-1).
# Configure GitHub secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# (or switch to OIDC: permissions id-token + role-to-assume — see AWS docs).

name: Build and push orchestrator (ECR)

on:
  push:
    branches: [main]
    paths:
      - "akena/03-agents/orchestrator/**"
      - "akena/03-agents/shared/**"
      - ".github/workflows/build-orchestrator.yml"
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 429104603340.dkr.ecr.eu-north-1.amazonaws.com
  ECR_REPOSITORY: akena/agents
  IMAGE_PREFIX: orchestrator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # buildx GHA cache (cache-to type=gha)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./akena/03-agents
          file: ./akena/03-agents/orchestrator/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_PREFIX }}-latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_PREFIX }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
