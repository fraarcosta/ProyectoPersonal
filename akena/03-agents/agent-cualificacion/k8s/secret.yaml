apiVersion: v1
kind: Secret
metadata:
  name: agent-cualificacion-secrets
  namespace: akena-dev
  labels:
    app: akena-agent-cualificacion
    agentic.io/agent-type: specialized
    agentic.io/agent-name: agent-cualificacion
    app.kubernetes.io/name: agent-cualificacion
    app.kubernetes.io/part-of: akena
    environment: dev
type: Opaque
stringData:
  # Replace with the real key before applying.
  # Recommended: inject via AWS Secrets Manager + External Secrets Operator
  # or a sealed-secrets workflow instead of storing plaintext here.
  ANTHROPIC_API_KEY: "REPLACE_ME"
