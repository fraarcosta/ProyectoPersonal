apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-cualificacion-config
  namespace: akena-dev
  labels:
    app: akena-agent-cualificacion
    agentic.io/agent-type: specialized
    agentic.io/agent-name: agent-cualificacion
    app.kubernetes.io/name: agent-cualificacion
    app.kubernetes.io/part-of: akena
    environment: dev
data:
  AGENT_NAME: "agent-cualificacion"
  AGENT_VERSION: "0.1.0"
  ANTHROPIC_MODEL: "claude-haiku-4-5-20251001"
  AUTH_VALIDATOR_TYPE: "none"
  GUARDRAIL_TYPE: "none"
  KB_TYPE: "none"
  LLM_PROVIDER_TYPE: "anthropic"
  MCP_CLIENT_TYPE: "http"
  MCP_SERVERS: "mcp-server-sharepoint-mdc=http://mcp-server-sharepoint-mdc.akena-dev.svc.cluster.local/mcp/mcp-server-sharepoint-mdc"
  MCP_SERVICE_SKILLS: "documents:search_documents,get_document,list_libraries,upload_document"
  MEMORY_LOCAL_PATH: "/app/.memory"
  MEMORY_STORE_TYPE: "local"
  PORT: "8080"
