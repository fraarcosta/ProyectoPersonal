apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-economico
  namespace: akena-dev
  labels:
    app: akena-agent-economico
    agentic.io/agent-type: specialized
    agentic.io/agent-name: agent-economico
    app.kubernetes.io/name: agent-economico
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: akena
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akena-agent-economico
  template:
    metadata:
      labels:
        app: akena-agent-economico
        agentic.io/agent-type: specialized
        agentic.io/agent-name: agent-economico
        app.kubernetes.io/name: agent-economico
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/part-of: akena
        environment: dev
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: agent-economico
          image: 429104603340.dkr.ecr.eu-north-1.amazonaws.com/akena/agents:agent-economico-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agent-economico-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: akena-secrets
                  key: anthropic-api-key
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: memory-store
              mountPath: /app/.memory
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: memory-store
          emptyDir: {}
      terminationGracePeriodSeconds: 30
